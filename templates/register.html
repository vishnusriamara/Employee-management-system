

{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">


<div class="card-header text-center bg-gradient-primary text-white">
Register
</div>

<div class="card-body">

<form action="/register" method="POST">

<input class="form-control mb-3" name="id" placeholder="User ID">

<input class="form-control mb-3" name="username" placeholder="Username">

<input class="form-control mb-3" name="password" type="password" placeholder="Password">

<input class="form-control mb-3" name="role" placeholder="Role">

<input class="form-control mb-3" name="email" placeholder="Email">

<button class="btn bg-gradient-primary text-white w-100">Register</button>

</form>

</div>
</div>

</div>
</div>

{% endblock %}
